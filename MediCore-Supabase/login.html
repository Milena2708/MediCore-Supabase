<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediCore — Autenticación</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    body { background: var(--gray-50); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .auth-container { background: var(--white); border: 1.5px solid var(--gray-200); border-radius: var(--radius-xl); padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: var(--shadow); }
    .auth-logo { display: flex; align-items: center; gap: .75rem; margin-bottom: 2rem; text-decoration: none; justify-content: center; }
    .auth-tabs { display: flex; gap: 1rem; border-bottom: 2px solid var(--gray-200); margin-bottom: 1.5rem; }
    .auth-tab { flex: 1; text-align: center; padding: .65rem; font-size: .85rem; font-weight: 600; color: var(--gray-400); cursor: pointer; border-bottom: 2px solid transparent; transition: all var(--tr); }
    .auth-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-logo">
    <div class="logo-mark">M</div>
    <div class="logo-text-wrap" style="text-align: left;">
      <span class="logo-name" style="color: var(--navy); font-weight: 800; font-size: 1.4rem;">MediCore</span>
      <span class="logo-sub" style="display: block; color: var(--gray-400); font-size: .75rem;">Sistema Clínico</span>
    </div>
  </div>

  <div class="auth-tabs">
    <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Ingresar</div>
    <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Registrarse</div>
  </div>

  <form id="form-login" novalidate>
    <div class="form-group" style="margin-bottom: 1rem;">
      <label class="form-label">Correo Electrónico <span class="req">*</span></label>
      <input type="email" class="form-control" id="login-email" placeholder="correo@ejemplo.com"/>
      <div class="form-error" id="login-email-err"></div>
    </div>
    <div class="form-group" style="margin-bottom: 1.5rem;">
      <label class="form-label">Contraseña <span class="req">*</span></label>
      <input type="password" class="form-control" id="login-password" placeholder="••••••••"/>
      <div class="form-error" id="login-password-err"></div>
    </div>
    <button type="button" class="btn btn-primary" style="width: 100%;" onclick="ejecutarLogin()">🔑 Iniciar Sesión</button>
  </form>

  <form id="form-register" novalidate style="display: none;">
    <div class="form-group" style="margin-bottom: 1rem;">
      <label class="form-label">Nombre Completo <span class="req">*</span></label>
      <input type="text" class="form-control" id="reg-nombre" placeholder="Ej: Juan Pérez"/>
      <div class="form-error" id="reg-nombre-err"></div>
    </div>
    <div class="form-group" style="margin-bottom: 1rem;">
      <label class="form-label">Correo Electrónico <span class="req">*</span></label>
      <input type="email" class="form-control" id="reg-email" placeholder="correo@ejemplo.com"/>
      <div class="form-error" id="reg-email-err"></div>
    </div>
    <div class="form-group" style="margin-bottom: 1rem;">
      <label class="form-label">Contraseña (Mín. 6 caracteres) <span class="req">*</span></label>
      <input type="password" class="form-control" id="reg-password" placeholder="••••••••"/>
      <div class="form-error" id="reg-password-err"></div>
    </div>
    <div class="form-group" style="margin-bottom: 1rem;">
      <label class="form-label">Confirmar Contraseña <span class="req">*</span></label>
      <input type="password" class="form-control" id="reg-password-conf" placeholder="••••••••"/>
      <div class="form-error" id="reg-password-conf-err"></div>
    </div>
    <div class="form-group" style="margin-bottom: 1.5rem;">
      <label class="form-label">Rol solicitado <span class="req">*</span></label>
      <select class="form-control" id="reg-rol">
        <option value="">Seleccionar rol…</option>
        <option value="Paciente">Paciente</option>
        <option value="Recepción">Recepción</option>
        <option value="Médico">Médico</option>
        <option value="Enfermería">Enfermería</option>
        <option value="Administrador">Administrador</option>
      </select>
      <div class="form-error" id="reg-rol-err"></div>
    </div>
    <button type="button" class="btn btn-success" style="width: 100%;" onclick="ejecutarRegistro()">📝 Crear Cuenta</button>
  </form>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<script src="login.js"></script>
</body>
</html>
